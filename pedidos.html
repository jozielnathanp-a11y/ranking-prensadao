<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prensadão do Lucão</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;overflow-x:hidden}
    body {
      font-family: Rajdhani, sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOPO — LOGO CENTRALIZADA */
    .top-section {
      background: linear-gradient(160deg, #1a0a00 0%, #2a1000 60%, #1a0500 100%);
      padding: 30px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-img {
      width: 210px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 30px rgba(255,200,0,0.55)) drop-shadow(0 4px 14px rgba(0,0,0,0.9));
    }

    /* BOTÕES */
    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      text-decoration: none;
      background: #FFD700;
      color: #111;
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-align: center;
      padding: 15px 20px;
      border-radius: 50px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      line-height: 1.2;
    }
    .btn:active, .btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      background: #FFE84D;
    }

    /* FOTO DO LANCHE */
    .img-wrapper {
      position: relative;
      width: 100%;
    }
    .img-wrapper::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, #1a0500, transparent);
      z-index: 2;
    }
    .img-wrapper::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, #111, transparent);
      z-index: 2;
    }
    .food-img {
      width: 100%;
      display: block;
      max-height: 260px;
      object-fit: cover;
      object-position: center 30%;
    }

    /* PROMOÇÃO DO DIA */
    .promo-section {
      background: #111;
      padding: 18px 20px 36px;
      width: 100%;
    }

    .promo-label {
      font-family: "Bebas Neue", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 6px;
      color: rgba(255,100,100,0.6);
      margin-bottom: 10px;
      text-align: center;
    }

    .promo-card {
      background: linear-gradient(135deg, #1a0000 0%, #2d0000 100%);
      border: 1px solid rgba(255,60,60,0.25);
      border-left: 4px solid #FF3C3C;
      border-radius: 12px;
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
    }
    .promo-card::after {
      content: "%";
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      font-family: "Bebas Neue", sans-serif;
      font-size: 5rem;
      color: rgba(255,60,60,0.06);
      line-height: 1;
      pointer-events: none;
    }

    .promo-name {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1rem;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }

    .promo-desc {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    .promo-prices {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .promo-price-new {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.2rem;
      color: #FF6666;
      letter-spacing: 1px;
    }

    .promo-price-old {
      text-decoration: line-through;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .promo-badge {
      background: #FF3C3C;
      color: #fff;
      font-family: "Bebas Neue", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      padding: 2px 8px;
      border-radius: 4px;
    }
  </style>
</head>
