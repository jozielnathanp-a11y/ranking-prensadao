<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prensadão do Lucão — Faça seu Pedido</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #F5D483;
      --dark: #0A0A0A;
      --dark2: #141414;
      --card-bg: #1A1A1A;
      --border: rgba(201,168,76,0.25);
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADER */
    header {
      width: 100%;
      padding: 40px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      overflow: hidden;
      box-shadow: 0 0 24px rgba(201,168,76,0.35);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 1px;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--gold-light);
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      text-align: center;
    }

    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8px auto 0;
    }

    /* MAIN */
    main {
      width: 100%;
      max-width: 480px;
      padding: 30px 20px 50px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 4px;
    }

    /* CARDS */
    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      text-decoration: none;
      color: #fff;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .card:active, .card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201,168,76,0.2);
    }

    .card:active::before, .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), #8B6914);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(201,168,76,0.3);
    }

    .card-text {
      flex: 1;
    }

    .card-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    .card-arrow {
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* FOOTER */
    footer {
      width: 100%;
      padding: 20px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ANIMATION */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header  { animation: fadeUp 0.5s ease both; }
    .card:nth-child(1) { animation: fadeUp 0.5s ease 0.1s both; }
    .card:nth-child(2) { animation: fadeUp 0.5s ease 0.2s both; }
    .card:nth-child(3) { animation: fadeUp 0.5s ease 0.3s both; }
    .section-label     { animation: fadeUp 0.5s ease 0.05s both; }
  </style>
</head>
<body>

  <header>
    <div class="logo-circle">🥩</div>
    <h1>Prensadão do Lucão</h1>
    <p class="subtitle">Escolha sua unidade</p>
    <div class="divider"></div>
  </header>

  <main>
    <p class="section-label">Selecione onde deseja pedir</p>

    <a class="card" href="https://pedido.anota.ai/loja/prensado-marechal-2?f=msa" target="_blank" rel="noopener">
      <div class="card-icon">🏠</div>
      <div class="card-text">
        <div class="card-name">Unidade Centro</div>
        <div class="card-desc">Retirada no local · Consumo no local</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card" href="https://pedido.anota.ai/loja/prensado-marechal" target="_blank" rel="noopener">
      <div class="card-icon">🛵</div>
      <div class="card-text">
        <div class="card-name">Unidade São Cristóvão</div>
        <div class="card-desc">Delivery · Retirada</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card" href="https://pedido.anota.ai/loja/prensado-do-luco" target="_blank" rel="noopener">
      <div class="card-icon">🍽️</div>
      <div class="card-text">
        <div class="card-name">Unidade Boqueirão</div>
        <div class="card-desc">Retirada no local · Consumo no local</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </main>

  <footer>Prensadão do Lucão &mdash; Guarapuava/PR</footer>

</body>
</html>
