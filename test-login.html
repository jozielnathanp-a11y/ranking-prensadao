<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body{background:#0a0a0a;color:#fff;font-family:sans-serif}
#login{display:flex;align-items:center;justify-content:center;height:100vh}
#app{display:none;padding:20px;font-size:2rem;text-align:center}
input{display:block;width:200px;padding:12px;margin:10px auto;background:#222;color:#fff;border:1px solid #444;border-radius:8px;font-size:1rem}
.btn{display:block;width:200px;padding:14px;margin:10px auto;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer}
</style></head>
<body>
<div id="login">
  <div>
    <p style="text-align:center;margin-bottom:20px">Teste Login</p>
    <input type="password" id="lsn" placeholder="senha">
    <button class="btn" onclick="doLogin()">ENTRAR</button>
    <div id="err" style="color:red;text-align:center;display:none">Incorreta</div>
  </div>
</div>
<div id="app">
  <p>Entrou com sucesso!</p>
</div>
<script>
function doLogin(){
  var v = document.getElementById("lsn").value;
  if(v === "josiel123"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    document.getElementById("err").style.display="block";
  }
}
</script>
</body>
</html>
