<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Perfil Comportamental IBC · Prensadão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
  .header { background: linear-gradient(135deg, #1a3a5c, #2980b9); color: white; padding: 28px; border-radius: 16px; text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.4em; margin-bottom: 6px; }
  .header p { opacity: 0.8; font-size: 0.88em; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .stat-num { font-size: 2em; font-weight: 700; }
  .stat-label { font-size: 0.78em; color: #888; margin-top: 4px; }
  .s-aguia { color: #9b59b6; }
  .s-gato { color: #27ae60; }
  .s-tubarao { color: #e74c3c; }
  .s-lobo { color: #e67e22; }
  .s-total { color: #2980b9; }
  .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card h2 { font-size: 1.05em; color: #1a3a5c; margin-bottom: 16px; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88em; font-weight: 600; }
  .btn-blue { background: #2980b9; color: white; }
  .btn-dark { background: #2c3e50; color: white; }
  .btn-green { background: #27ae60; color: white; }
  select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.88em; background: white; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84em; }
  th { background: #1a3a5c; color: white; padding: 10px 8px; text-align: left; }
  td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:hover { background: #f8f9fa; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78em; font-weight: 700; }
  .badge-aguia   { background: #f3e5ff; color: #6c3483; }
  .badge-gato    { background: #e8f8e8; color: #1a8a4a; }
  .badge-tubarao { background: #fde8e8; color: #c0392b; }
  .badge-lobo    { background: #fff0e0; color: #d35400; }
  .detail-row { display: none; background: #f8f9fa; }
  .detail-content { padding: 12px 16px; font-size: 0.82em; line-height: 1.7; }
  .pct-mini { display: inline-block; width: 80px; background: #eee; border-radius: 4px; height: 8px; vertical-align: middle; overflow: hidden; margin-left: 6px; }
  .pct-fill { height: 100%; border-radius: 4px; }
  .loading { text-align: center; padding: 30px; color: #999; }
  .vazio { text-align: center; padding: 40px; color: #ccc; }
  .data-txt { font-size: 0.75em; color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦅 Painel de Resultados — Perfil Comportamental IBC</h1>
    <p>Prensadão · Somente para uso do gestor · Ned Herman</p>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-num s-total" id="st-total">—</div><div class="stat-label">Total avaliações</div></div>
    <div class="stat-card"><div class="stat-num s-aguia" id="st-aguia">—</div><div class="stat-label">🦅 Águia</div></div>
    <div class="stat-card"><div class="stat-num s-gato" id="st-gato">—</div><div class="stat-label">🐱 Gato</div></div>
    <div class="stat-card"><div class="stat-num s-tubarao" id="st-tubarao">—</div><div class="stat-label">🦈 Tubarão</div></div>
    <div class="stat-card"><div class="stat-num s-lobo" id="st-lobo">—</div><div class="stat-label">🐺 Lobo</div></div>
  </div>

  <div class="card">
    <h2>📋 Todas as Avaliações</h2>
    <div class="btn-group">
      <button class="btn btn-blue" onclick="carregar()">🔄 Atualizar</button>
      <button class="btn btn-dark" onclick="exportarPDF()">📄 PDF</button>
      <button class="btn btn-green" onclick="exportarCSV()">📊 CSV (Excel)</button>
      <select id="filtro" onchange="filtrar()">
        <option value="">Todos os perfis</option>
        <option value="Águia">🦅 Águia</option>
        <option value="Gato">🐱 Gato</option>
        <option value="Tubarão">🦈 Tubarão</option>
        <option value="Lobo">🐺 Lobo</option>
      </select>
    </div>
    <div id="tabela-box"><div class="loading">Carregando...</div></div>
  </div>
</div>

<script>
const URL_SB = 'https://trbyynbtuzpszdvjivbs.supabase.co';
const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyYnl5bmJ0dXpwc3pkdmppdmJzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODIyODAxOCwiZXhwIjoyMDkzODA0MDE4fQ.OZq8bycNQWEpdbxPiSuB9gt7A0fPKNkawcrtE5XpGFg';

const ANIMAIS = {I:'Águia',C:'Gato',A:'Tubarão',O:'Lobo'};
const EMOJIS = {Águia:'🦅',Gato:'🐱',Tubarão:'🦈',Lobo:'🐺'};
const CLASSES = {Águia:'aguia',Gato:'gato',Tubarão:'tubarao',Lobo:'lobo'};
const CORES_PCT = {Águia:'#9b59b6',Gato:'#27ae60',Tubarão:'#e74c3c',Lobo:'#e67e22'};

let dados = [];

async function carregar() {
  document.getElementById('tabela-box').innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const r = await fetch(`${URL_SB}/rest/v1/auditoria?acao=eq.perfil_comportamental_ibc&order=created_at.desc&limit=200`, {
      headers: {'apikey':KEY_SB,'Authorization':`Bearer ${KEY_SB}`}
    });
    const d = await r.json();
    dados = d.filter(x => x.detalhe && x.detalhe.principal);
    renderTabela(dados);
    atualizarStats(dados);
  } catch(e) {
    document.getElementById('tabela-box').innerHTML = '<div class="vazio">❌ Erro ao carregar.</div>';
  }
}

function atualizarStats(d) {
  document.getElementById('st-total').textContent = d.length;
  const cnt = {Águia:0,Gato:0,Tubarão:0,Lobo:0};
  d.forEach(x => {
    const a = ANIMAIS[x.detalhe.principal];
    if(a) cnt[a]++;
  });
  document.getElementById('st-aguia').textContent = cnt['Águia'];
  document.getElementById('st-gato').textContent = cnt['Gato'];
  document.getElementById('st-tubarao').textContent = cnt['Tubarão'];
  document.getElementById('st-lobo').textContent = cnt['Lobo'];
}

function renderTabela(d) {
  if(!d.length) { document.getElementById('tabela-box').innerHTML='<div class="vazio">Nenhuma avaliação ainda.</div>'; return; }
  let html = `<table><thead><tr>
    <th>#</th><th>Nome</th><th>Data</th><th>Perfil Principal</th><th>Secundário</th><th>Percentuais</th><th></th>
  </tr></thead><tbody>`;
  d.forEach((x,i) => {
    const det = x.detalhe;
    const dt = new Date(det.data||x.created_at);
    const dtStr = dt.toLocaleDateString('pt-BR');
    const hrStr = dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const principal = ANIMAIS[det.principal]||det.principal;
    const segundo = det.segundo ? (ANIMAIS[det.segundo]||det.segundo) : '—';
    const pct = det.percentuais||{};

    const barrinhas = ['I','C','A','O'].map(k => {
      const animal = ANIMAIS[k];
      const val = pct[k]||0;
      return `<span title="${animal}: ${val}%">
        ${EMOJIS[animal]}${val}%<span class="pct-mini"><span class="pct-fill" style="width:${val}%;background:${CORES_PCT[animal]}"></span></span>
      </span> `;
    }).join('');

    html += `<tr onclick="toggle('d${i}')">
      <td>${d.length-i}</td>
      <td><strong>${det.nome||'—'}</strong></td>
      <td><span class="data-txt">${dtStr}<br>${hrStr}</span></td>
      <td><span class="badge badge-${CLASSES[principal]||''}">${EMOJIS[principal]||''} ${principal}</span></td>
      <td><span class="badge badge-${CLASSES[segundo]||''}">${EMOJIS[segundo]||''} ${segundo}</span></td>
      <td style="white-space:nowrap">${barrinhas}</td>
      <td style="color:#2980b9;cursor:pointer">▼</td>
    </tr>
    <tr class="detail-row" id="d${i}"><td colspan="7">
      <div class="detail-content">
        <strong>Pontuações brutas:</strong>
        🦅 Águia (I): ${det.scores?.I||0} pts (${pct.I||0}%) &nbsp;·&nbsp;
        🐱 Gato (C): ${det.scores?.C||0} pts (${pct.C||0}%) &nbsp;·&nbsp;
        🦈 Tubarão (A): ${det.scores?.A||0} pts (${pct.A||0}%) &nbsp;·&nbsp;
        🐺 Lobo (O): ${det.scores?.O||0} pts (${pct.O||0}%)
        <br><strong>Perfil principal:</strong> ${EMOJIS[principal]||''} ${principal} &nbsp;|&nbsp;
        <strong>Secundário:</strong> ${EMOJIS[segundo]||''} ${segundo}
      </div>
    </td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tabela-box').innerHTML = html;
}

function toggle(id) {
  const r = document.getElementById(id);
  r.style.display = r.style.display==='table-row'?'none':'table-row';
}

function filtrar() {
  const f = document.getElementById('filtro').value;
  if(!f) { renderTabela(dados); return; }
  renderTabela(dados.filter(x => (ANIMAIS[x.detalhe.principal]||x.detalhe.principal)===f));
}

function exportarCSV() {
  if(!dados.length) return alert('Nenhum dado.');
  const head = ['Nome','Data','Perfil Principal','Perfil Secundário','Águia %','Gato %','Tubarão %','Lobo %'];
  const rows = dados.map(x => {
    const det = x.detalhe;
    const dt = new Date(det.data||x.created_at).toLocaleString('pt-BR');
    const pct = det.percentuais||{};
    return [det.nome||'',dt,ANIMAIS[det.principal]||'',det.segundo?(ANIMAIS[det.segundo]||''):'',pct.I||0,pct.C||0,pct.A||0,pct.O||0];
  });
  const csv = [head,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const b = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `perfil-comportamental-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function exportarPDF() {
  if(!dados.length) return alert('Nenhum dado.');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFillColor(26,58,92);doc.rect(0,0,297,20,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('Painel — Perfil Comportamental IBC · Prensadão',148,13,{align:'center'});

  const rows = dados.map((x,i) => {
    const det = x.detalhe;
    const dt = new Date(det.data||x.created_at).toLocaleDateString('pt-BR');
    const pct = det.percentuais||{};
    const principal = ANIMAIS[det.principal]||det.principal;
    const segundo = det.segundo?(ANIMAIS[det.segundo]||''):'—';
    return [dados.length-i,det.nome||'',dt,`${EMOJIS[principal]||''} ${principal}`,`${EMOJIS[segundo]||''} ${segundo}`,`I:${pct.I||0}% C:${pct.C||0}% A:${pct.A||0}% O:${pct.O||0}%`];
  });

  doc.autoTable({
    startY:25,
    head:[['#','Nome','Data','Perfil Principal','Secundário','Percentuais']],
    body:rows,
    styles:{fontSize:9,cellPadding:4},
    headStyles:{fillColor:[26,58,92],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,249,250]},
    columnStyles:{0:{cellWidth:10},1:{cellWidth:50},2:{cellWidth:22}}
  });

  doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text(`Gerado em ${new Date().toLocaleDateString('pt-BR')} · ${dados.length} avaliações`,148,doc.internal.pageSize.height-5,{align:'center'});
  doc.save(`painel-perfil-ibc-${new Date().toISOString().slice(0,10)}.pdf`);
}

carregar();
</script>
</body>
</html>
