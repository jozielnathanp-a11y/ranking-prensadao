<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache">
  <title>Painel Gestor — Checklists</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#0d0d0d;color:#fff;padding:16px;max-width:600px;margin:0 auto}
    h1{font-size:1.2rem;text-align:center;color:#ff6a00;margin-bottom:4px}
    .sub{text-align:center;font-size:0.78rem;color:#666;margin-bottom:20px}
    .semana-sel{display:flex;gap:8px;margin-bottom:20px;align-items:center}
    .semana-sel label{font-size:0.8rem;color:#888}
    .semana-sel input{background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 10px;border-radius:8px;font-size:0.85rem;flex:1}
    .btn-buscar{background:#ff6a00;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:0.85rem;font-weight:bold}
    .card{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:16px}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .card-nome{font-size:1rem;font-weight:bold;color:#ff6a00}
    .card-data{font-size:0.72rem;color:#555;margin-bottom:12px}
    .badge-ok{background:#1a4a1a;color:#4caf50;padding:3px 10px;border-radius:20px;font-size:0.75rem}
    .badge-pend{background:#4a3a1a;color:#ff9800;padding:3px 10px;border-radius:20px;font-size:0.75rem}
    .tarefa-row{padding:8px 0;border-bottom:1px solid #222}
    .tarefa-row:last-child{border-bottom:none}
    .tarefa-desc{font-size:0.8rem;color:#aaa;margin-bottom:4px}
    .status-sim{color:#4caf50;font-size:0.82rem;font-weight:bold}
    .status-nao{color:#f44336;font-size:0.82rem;font-weight:bold}
    .fotos-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .fotos-row img{width:80px;height:80px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid #333}
    .obs{font-size:0.78rem;color:#888;margin-top:10px;padding:8px;background:#111;border-radius:6px}
    .sem-envio{text-align:center;padding:20px;color:#555;font-size:0.85rem}
    .pending-list{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:16px;border-left:3px solid #ff9800}
    .pending-list h3{font-size:0.85rem;color:#ff9800;margin-bottom:8px}
    .pending-item{font-size:0.82rem;color:#888;padding:3px 0}
    .lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:999;justify-content:center;align-items:center}
    .lb.vis{display:flex}
    .lb img{max-width:95%;max-height:90vh;border-radius:8px}
    .lb-close{position:absolute;top:16px;right:16px;background:#ff6a00;border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer}
    .loading{text-align:center;padding:30px;color:#666}
    .senha-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh}
    .senha-card{background:#1a1a1a;padding:24px;border-radius:12px;width:100%;max-width:320px}
    .senha-card label{display:block;font-size:0.78rem;color:#666;margin-bottom:6px}
    .senha-card input{width:100%;background:#111;border:1px solid #333;color:#fff;padding:12px;border-radius:8px;font-size:1rem;margin-bottom:12px}
    .senha-card button{width:100%;background:#ff6a00;color:#fff;border:none;border-radius:8px;padding:12px;font-size:1rem;font-weight:bold;cursor:pointer}
    .senha-err{color:#f44336;font-size:0.82rem;text-align:center;margin-top:8px;display:none}
  </style>
</head>
<body>

<div id="lb" class="lb">
  <button class="lb-close" id="lb-close">X</button>
  <img id="lb-img" src="">
</div>

<div id="senha-screen" class="senha-screen">
  <h1>PRENSADAO</h1>
  <p class="sub">Painel do Gestor</p>
  <div class="senha-card">
    <label>Senha do gestor</label>
    <input type="password" id="inp-senha" placeholder="...">
    <button id="btn-entrar">ENTRAR</button>
    <div class="senha-err" id="senha-err">Senha incorreta!</div>
  </div>
</div>

<div id="app" style="display:none">
  <h1>PRENSADAO</h1>
  <p class="sub">Painel do Gestor - Checklists</p>
  <div class="semana-sel">
    <label>Semana:</label>
    <input type="week" id="inp-semana">
    <button class="btn-buscar" id="btn-buscar">Buscar</button>
  </div>
  <div id="resultado"></div>
</div>

<script>
var SB_URL = 'https://trbyynbtuzpszdvjivbs.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyYnl5bmJ0dXpwc3pkdmppdmJzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODIyODAxOCwiZXhwIjoyMDkzODA0MDE4fQ.OZq8bycNQWEpdbxPiSuB9gt7A0fPKNkawcrtE5XpGFg';
var TAREFAS = ["Lavar o balcão onde as embalagens e batata palha são armazenadas com água e sabão, e organizá-lo.", "Realizar a limpeza do freezer branco com água e sabão, seguida da higienização de bandejas e potes de maionese.", "Realizar a higienização da estufa e do fogão com água e sabão, mantendo o balcão organizado e limpo.", "Higienizar a mesa de fritura e recipientes de porção, organizando embalagens e efetuando contagem dos potes.", "Limpar o armário dos funcionários removendo a gordura e sujeira externa."];
var NOMES = {"cl-caua": "Cauã", "cl-kauany": "Kauany", "cl-ruan": "Ruan", "cl-gabriel": "Gabriel"};
var TODOS = ['cl-caua','cl-kauany','cl-ruan','cl-gabriel'];

document.getElementById('btn-entrar').onclick = function() {
  var v = document.getElementById('inp-senha').value;
  if (v === 'josiel123') {
    document.getElementById('senha-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    var hoje = new Date();
    var jan1 = new Date(hoje.getFullYear(), 0, 1);
    var sem = Math.ceil(((hoje - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    document.getElementById('inp-semana').value = hoje.getFullYear() + '-W' + String(sem).padStart(2,'0');
    buscar();
  } else {
    document.getElementById('senha-err').style.display = 'block';
  }
};

document.getElementById('inp-senha').onkeydown = function(e) {
  if (e.key === 'Enter') document.getElementById('btn-entrar').onclick();
};

document.getElementById('btn-buscar').onclick = buscar;

document.getElementById('lb-close').onclick = function() {
  document.getElementById('lb').classList.remove('vis');
  document.getElementById('lb-img').src = '';
};

document.getElementById('lb').onclick = function(e) {
  if (e.target === this) {
    this.classList.remove('vis');
    document.getElementById('lb-img').src = '';
  }
};

function buscar() {
  var semana = document.getElementById('inp-semana').value;
  if (!semana) return;
  var res = document.getElementById('resultado');
  res.innerHTML = '<div class="loading">Buscando...</div>';
  fetch(SB_URL + '/rest/v1/prd_checklist?semana=eq.' + semana + '&order=ts.desc', {
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
  })
  .then(function(r) { return r.json(); })
  .then(function(data) { renderResultado(data, semana); })
  .catch(function() { res.innerHTML = '<div class="sem-envio">Erro ao buscar dados.</div>'; });
}

function renderResultado(data, semana) {
  var res = document.getElementById('resultado');
  var html = '';

  var enviaram = data.map(function(d) { return d.colab_id; });
  var pendentes = TODOS.filter(function(id) { return enviaram.indexOf(id) === -1; });
  if (pendentes.length > 0) {
    html += '<div class="pending-list"><h3>Ainda nao enviaram esta semana:</h3>';
    pendentes.forEach(function(id) {
      html += '<div class="pending-item">- ' + (NOMES[id] || id) + '</div>';
    });
    html += '</div>';
  }

  if (data.length === 0) {
    html += '<div class="sem-envio">Nenhum checklist enviado para ' + semana + '</div>';
    res.innerHTML = html;
    return;
  }

  data.forEach(function(item) {
    var nome = NOMES[item.colab_id] || item.colab_id;
    var data_fmt = new Date(item.ts).toLocaleString('pt-BR');
    var tks = item.tks || {};
    var phs = item.phs || {};
    var todos_sim = TAREFAS.every(function(t, i) { return tks[i] === 'sim' || tks[String(i)] === 'sim'; });

    html += '<div class="card">';
    html += '<div class="card-header">';
    html += '<span class="card-nome">' + nome + '</span>';
    html += '<span class="' + (todos_sim ? 'badge-ok' : 'badge-pend') + '">' + (todos_sim ? 'Completo' : 'Incompleto') + '</span>';
    html += '</div>';
    html += '<div class="card-data">Enviado em ' + data_fmt + '</div>';

    TAREFAS.forEach(function(t, i) {
      var resp = tks[i] || tks[String(i)];
      var ft = phs[i] || phs[String(i)] || [];
      if (!Array.isArray(ft)) ft = Object.values(ft);
      ft = ft.filter(function(f) { return f; });

      html += '<div class="tarefa-row">';
      html += '<div class="tarefa-desc">' + (i+1) + '. ' + t + '</div>';
      html += '<div class="' + (resp === 'sim' ? 'status-sim' : 'status-nao') + '">';
      html += resp === 'sim' ? 'Feito' : 'Nao feito';
      html += '</div>';
      if (ft.length > 0) {
        html += '<div class="fotos-row">';
        ft.forEach(function(url) {
          html += '<img src="' + url + '" data-url="' + url + '" loading="lazy">';
        });
        html += '</div>';
      }
      html += '</div>';
    });

    if (item.obs) {
      html += '<div class="obs">Obs: ' + item.obs + '</div>';
    }
    html += '</div>';
  });

  res.innerHTML = html;

  // Bind foto clicks
  var imgs = res.querySelectorAll('.fotos-row img');
  for (var i = 0; i < imgs.length; i++) {
    imgs[i].onclick = (function(url) {
      return function() {
        document.getElementById('lb-img').src = url;
        document.getElementById('lb').classList.add('vis');
      };
    })(imgs[i].getAttribute('data-url'));
  }
}
</script>
</body>
</html>
