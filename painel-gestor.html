<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Gestor</title>
</head>
<body style="background:#0a0a0a;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0">
<div id="login" style="text-align:center;padding:24px;max-width:320px;width:100%">
  <div style="font-size:3rem">🛂</div>
  <div style="font-size:1.4rem;font-weight:900;margin:8px 0 4px">PRENSADÃO</div>
  <div style="font-size:0.8rem;color:#555;margin-bottom:24px">Painel do Gestor</div>
  <input type="password" id="lsn" placeholder="Senha"
    style="width:100%;padding:13px;background:#1a1a1a;border:1px solid #333;border-radius:10px;color:#fff;font-size:1rem;margin-bottom:12px;box-sizing:border-box">
  <button id="btn" style="width:100%;padding:14px;background:#4a90d9;border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:800;cursor:pointer">ENTRAR</button>
  <div id="err" style="color:#fc8181;font-size:0.8rem;margin-top:10px;display:none">Senha incorreta</div>
</div>
<div id="app" style="display:none;padding:20px;width:100%;text-align:center">
  <p style="font-size:1.5rem;color:#48bb78">Login OK!</p>
</div>
<script>
document.getElementById("btn").addEventListener("click", function(){
  var v = document.getElementById("lsn").value;
  if(v === "josiel123"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    var e = document.getElementById("err");
    e.style.display = "block";
    setTimeout(function(){ e.style.display="none"; }, 2000);
  }
});
document.getElementById("lsn").addEventListener("keydown", function(ev){
  if(ev.key === "Enter") document.getElementById("btn").click();
});
</script>
</body>
</html>
