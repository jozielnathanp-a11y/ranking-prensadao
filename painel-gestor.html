<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Painel do Gestor — Prensadão</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
#app-screen{display:none;min-height:100vh;padding:24px}
.l-logo{font-size:3rem;margin-bottom:10px}
.l-brand{font-size:1.4rem;font-weight:900;letter-spacing:2px;margin-bottom:4px}
.l-sub{font-size:0.82rem;color:#555;margin-bottom:36px}
.l-card{background:#111;border:1px solid #1e1e1e;border-radius:18px;padding:28px;width:100%;max-width:340px}
.l-card label{display:block;font-size:0.75rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.l-card input{width:100%;padding:13px 14px;background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:10px;color:#fff;font-size:0.95rem;margin-bottom:16px}
.l-btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b00,#ff9500);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:1px}
.l-err{display:none;color:#ff4444;font-size:0.8rem;text-align:center;margin-top:8px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="l-logo">🛂</div>
  <div class="l-brand">PRENSADÃO</div>
  <div class="l-sub">Painel do Gestor</div>
  <div class="l-card">
    <label>Senha</label>
    <input type="password" id="lsn" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="l-btn" onclick="doLogin()">ENTRAR</button>
    <div class="l-err" id="lerr">Senha incorreta.</div>
  </div>
</div>

<div id="app-screen" style="display:none">
  <h2 style="color:#ff9500;margin-bottom:16px">✅ Painel do Gestor</h2>
  <p style="color:#aaa">Login feito com sucesso!</p>
</div>

<script>
function getSn(){ return 'josiel123'; }
function doLogin(){
  var v = document.getElementById('lsn').value;
  if(v === getSn()){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'block';
  } else {
    var err = document.getElementById('lerr');
    if(err){ err.style.display='block'; setTimeout(function(){ err.style.display='none'; },2000); }
  }
}
</script>
</body>
</html>
