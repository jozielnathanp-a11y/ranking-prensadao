<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Resultados DISC — Prensadão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
  .header { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; padding: 28px; border-radius: 16px; text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.5em; margin-bottom: 6px; }
  .header p { opacity: 0.8; font-size: 0.9em; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .stat-card .num { font-size: 2em; font-weight: 700; color: #c0392b; }
  .stat-card .label { font-size: 0.8em; color: #888; margin-top: 4px; }
  .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card h2 { font-size: 1.05em; color: #2c3e50; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
  th { background: #2c3e50; color: white; padding: 10px 8px; text-align: left; }
  th:first-child { border-radius: 8px 0 0 0; }
  th:last-child { border-radius: 0 8px 0 0; }
  td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
  tr:hover { background: #f8f9fa; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78em; font-weight: 600; }
  .badge-D { background: #fde8e8; color: #c0392b; }
  .badge-I { background: #fef9e7; color: #f39c12; }
  .badge-S { background: #e8f8f5; color: #27ae60; }
  .badge-C { background: #eaf0fb; color: #2980b9; }
  .badge-L { background: #f4ecf7; color: #8e44ad; }
  .badge-E { background: #fef0e7; color: #e67e22; }
  .badge-A { background: #e8f4fd; color: #2980b9; }
  .badge-R { background: #e8f8f5; color: #16a085; }
  .badge-Q1 { background: #eaf0fb; color: #2c3e50; }
  .badge-Q2 { background: #e8f8e8; color: #27ae60; }
  .badge-Q3 { background: #fff3e0; color: #e67e22; }
  .badge-Q4 { background: #fce4ec; color: #c0392b; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 600; }
  .btn-primary { background: #c0392b; color: white; }
  .btn-secondary { background: #2c3e50; color: white; }
  .btn-green { background: #27ae60; color: white; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .loading { text-align: center; padding: 30px; color: #888; }
  .vazio { text-align: center; padding: 40px; color: #ccc; font-size: 1em; }
  .data-hora { font-size: 0.75em; color: #aaa; }
  .detail-row { display: none; background: #f8f9fa; }
  .detail-content { padding: 12px; }
  select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9em; background: white; }
  @media (max-width: 600px) { .desktop-only { display: none; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Painel de Resultados — Avaliação de Perfil</h1>
    <p>Prensadão · Somente para uso do gestor</p>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="num" id="stat-total">—</div><div class="label">Avaliações</div></div>
    <div class="stat-card"><div class="num" id="stat-disc">—</div><div class="label">Perfil DISC mais comum</div></div>
    <div class="stat-card"><div class="num" id="stat-comp">—</div><div class="label">Comportamental mais comum</div></div>
    <div class="stat-card"><div class="num" id="stat-cerebral">—</div><div class="label">Cerebral mais comum</div></div>
  </div>

  <div class="card">
    <h2>📋 Todas as Avaliações</h2>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="carregarDados()">🔄 Atualizar</button>
      <button class="btn btn-secondary" onclick="exportarPDF()">📄 Exportar PDF</button>
      <button class="btn btn-green" onclick="exportarCSV()">📊 Exportar CSV</button>
      <select id="filtro-disc" onchange="filtrarTabela()">
        <option value="">Todos os perfis DISC</option>
        <option value="Dominância">Dominância (D)</option>
        <option value="Influência">Influência (I)</option>
        <option value="Estabilidade">Estabilidade (S)</option>
        <option value="Conformidade">Conformidade (C)</option>
      </select>
    </div>
    <div id="tabela-container">
      <div class="loading">Carregando avaliações...</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://trbyynbtuzpszdvjivbs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyYnl5bmJ0dXpwc3pkdmppdmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYxMTEzMDIsImV4cCI6MjA2MTY4NzMwMn0.gC1T2sWRYrOWqINUcgVcpTWIWQhNh-4vM5b_8PVt-N0';

let todosOsDados = [];

async function carregarDados() {
  document.getElementById('tabela-container').innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/auditoria?acao=eq.disc_avaliacao&order=created_at.desc&limit=200`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    todosOsDados = data.filter(d => d.detalhe && d.detalhe.disc);
    renderTabela(todosOsDados);
    atualizarStats(todosOsDados);
  } catch(e) {
    document.getElementById('tabela-container').innerHTML = '<div class="vazio">❌ Erro ao carregar dados.</div>';
  }
}

function atualizarStats(dados) {
  document.getElementById('stat-total').textContent = dados.length;
  if (dados.length === 0) return;

  const discCount = {};
  const compCount = {};
  const cerebralCount = {};
  dados.forEach(d => {
    const dp = d.detalhe.disc?.principal || '';
    const cp = d.detalhe.comportamental?.principal || '';
    const cbp = d.detalhe.cerebral?.principal || '';
    discCount[dp] = (discCount[dp]||0)+1;
    compCount[cp] = (compCount[cp]||0)+1;
    cerebralCount[cbp] = (cerebralCount[cbp]||0)+1;
  });

  const discLabel = {D:'D',I:'I',S:'S',C:'C'};
  const compLabel = {L:'Lider',E:'Exec.',A:'Anal.',R:'Relac.'};
  const cerebralLabel = {Q1:'Lógico',Q2:'Organ.',Q3:'Relac.',Q4:'Criativo'};

  const topDisc = Object.entries(discCount).sort((a,b)=>b[1]-a[1])[0];
  const topComp = Object.entries(compCount).sort((a,b)=>b[1]-a[1])[0];
  const topCerebral = Object.entries(cerebralCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('stat-disc').textContent = topDisc ? discLabel[topDisc[0]] : '—';
  document.getElementById('stat-comp').textContent = topComp ? compLabel[topComp[0]] : '—';
  document.getElementById('stat-cerebral').textContent = topCerebral ? cerebralLabel[topCerebral[0]] : '—';
}

function renderTabela(dados) {
  if (dados.length === 0) {
    document.getElementById('tabela-container').innerHTML = '<div class="vazio">Nenhuma avaliação encontrada ainda.</div>';
    return;
  }

  const discNomes = {D:'Dominância',I:'Influência',S:'Estabilidade',C:'Conformidade'};
  const compNomes = {L:'Liderança',E:'Executor(a)',A:'Analítico(a)',R:'Relacional'};
  const cerebralNomes = {Q1:'Lógico',Q2:'Organizado',Q3:'Relacional',Q4:'Criativo'};

  let html = `<table id="tabela-resultado">
    <thead><tr>
      <th>#</th>
      <th>Nome</th>
      <th>Data</th>
      <th>DISC</th>
      <th>Comportamental</th>
      <th class="desktop-only">Cerebral</th>
      <th>Detalhes</th>
    </tr></thead><tbody>`;

  dados.forEach((d, i) => {
    const det = d.detalhe;
    const data = new Date(det.data || d.created_at);
    const dataStr = data.toLocaleDateString('pt-BR');
    const horaStr = data.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    const discP = det.disc?.principal || '?';
    const compP = det.comportamental?.principal || '?';
    const cerebralP = det.cerebral?.principal || '?';

    html += `<tr onclick="toggleDetalhe('det-${i}')">
      <td>${dados.length - i}</td>
      <td><strong>${det.nome || '—'}</strong></td>
      <td><span class="data-hora">${dataStr}<br>${horaStr}</span></td>
      <td><span class="badge badge-${discP}">${discNomes[discP] || discP}</span></td>
      <td><span class="badge badge-${compP}">${compNomes[compP] || compP}</span></td>
      <td class="desktop-only"><span class="badge badge-${cerebralP}">${cerebralNomes[cerebralP] || cerebralP}</span></td>
      <td><span style="cursor:pointer;color:#c0392b">▼ ver</span></td>
    </tr>
    <tr class="detail-row" id="det-${i}">
      <td colspan="7">
        <div class="detail-content">
          <strong>DISC — Pontuações:</strong>
          D: ${det.disc?.scores?.D||0} · I: ${det.disc?.scores?.I||0} · S: ${det.disc?.scores?.S||0} · C: ${det.disc?.scores?.C||0}<br>
          <strong>Comportamental — Pontuações:</strong>
          L: ${det.comportamental?.scores?.L||0} · E: ${det.comportamental?.scores?.E||0} · A: ${det.comportamental?.scores?.A||0} · R: ${det.comportamental?.scores?.R||0}<br>
          <strong>Cerebral — Pontuações:</strong>
          Q1(Lóg): ${det.cerebral?.scores?.Q1||0} · Q2(Org): ${det.cerebral?.scores?.Q2||0} · Q3(Rel): ${det.cerebral?.scores?.Q3||0} · Q4(Cri): ${det.cerebral?.scores?.Q4||0}
        </div>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tabela-container').innerHTML = html;
}

function toggleDetalhe(id) {
  const row = document.getElementById(id);
  row.style.display = row.style.display === 'table-row' ? 'none' : 'table-row';
}

function filtrarTabela() {
  const filtro = document.getElementById('filtro-disc').value;
  const discNomes = {D:'Dominância',I:'Influência',S:'Estabilidade',C:'Conformidade'};
  if (!filtro) { renderTabela(todosOsDados); return; }
  const filtrados = todosOsDados.filter(d => {
    const p = d.detalhe?.disc?.principal;
    return discNomes[p] === filtro;
  });
  renderTabela(filtrados);
}

function exportarCSV() {
  if (todosOsDados.length === 0) return alert('Nenhum dado para exportar.');
  const discNomes = {D:'Dominância',I:'Influência',S:'Estabilidade',C:'Conformidade'};
  const compNomes = {L:'Liderança',E:'Executor(a)',A:'Analítico(a)',R:'Relacional'};
  const cerebralNomes = {Q1:'Lógico/Analítico',Q2:'Organizado/Sequencial',Q3:'Relacional/Emocional',Q4:'Criativo/Intuitivo'};

  const headers = ['Nome','Data','Perfil DISC','D','I','S','C','Perfil Comportamental','L','E','A','R','Preferência Cerebral','Q1(Lógico)','Q2(Organizado)','Q3(Relacional)','Q4(Criativo)'];
  const rows = todosOsDados.map(d => {
    const det = d.detalhe;
    const data = new Date(det.data || d.created_at).toLocaleString('pt-BR');
    return [
      det.nome || '',
      data,
      discNomes[det.disc?.principal] || '',
      det.disc?.scores?.D || 0,
      det.disc?.scores?.I || 0,
      det.disc?.scores?.S || 0,
      det.disc?.scores?.C || 0,
      compNomes[det.comportamental?.principal] || '',
      det.comportamental?.scores?.L || 0,
      det.comportamental?.scores?.E || 0,
      det.comportamental?.scores?.A || 0,
      det.comportamental?.scores?.R || 0,
      cerebralNomes[det.cerebral?.principal] || '',
      det.cerebral?.scores?.Q1 || 0,
      det.cerebral?.scores?.Q2 || 0,
      det.cerebral?.scores?.Q3 || 0,
      det.cerebral?.scores?.Q4 || 0
    ];
  });

  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `avaliacoes-disc-prensadao-${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

function exportarPDF() {
  if (todosOsDados.length === 0) return alert('Nenhum dado para exportar.');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  doc.setFillColor(44,62,80);
  doc.rect(0,0,297,20,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(13);
  doc.setFont('helvetica','bold');
  doc.text('Painel de Resultados — Avaliação de Perfil · Prensadão', 148, 13, {align:'center'});

  const discNomes = {D:'Dominância',I:'Influência',S:'Estabilidade',C:'Conformidade'};
  const compNomes = {L:'Liderança',E:'Executor(a)',A:'Analítico(a)',R:'Relacional'};
  const cerebralNomes = {Q1:'Lógico',Q2:'Organizado',Q3:'Relacional',Q4:'Criativo'};

  const tableData = todosOsDados.map((d, i) => {
    const det = d.detalhe;
    const data = new Date(det.data || d.created_at).toLocaleDateString('pt-BR');
    return [
      todosOsDados.length - i,
      det.nome || '',
      data,
      discNomes[det.disc?.principal] || '?',
      `D:${det.disc?.scores?.D||0} I:${det.disc?.scores?.I||0} S:${det.disc?.scores?.S||0} C:${det.disc?.scores?.C||0}`,
      compNomes[det.comportamental?.principal] || '?',
      cerebralNomes[det.cerebral?.principal] || '?'
    ];
  });

  doc.autoTable({
    startY: 25,
    head: [['#', 'Nome', 'Data', 'Perfil DISC', 'Pontuações DISC', 'Comportamental', 'Cerebral']],
    body: tableData,
    styles: { fontSize: 9, cellPadding: 4 },
    headStyles: { fillColor: [192,57,43], textColor: 255, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [248,249,250] },
    columnStyles: { 0: {cellWidth:10}, 1: {cellWidth:45}, 2: {cellWidth:22} }
  });

  const hoje = new Date().toLocaleDateString('pt-BR');
  doc.setFontSize(8);
  doc.setTextColor(150,150,150);
  doc.text(`Gerado em ${hoje} · ${todosOsDados.length} avaliações`, 148, doc.internal.pageSize.height - 5, {align:'center'});

  doc.save(`painel-avaliacoes-${new Date().toISOString().slice(0,10)}.pdf`);
}

// Carregar automaticamente
carregarDados();
</script>
</body>
</html>
