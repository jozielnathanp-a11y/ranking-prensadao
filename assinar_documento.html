<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura Online - Documento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #e9e9e9;
            font-family: Arial, sans-serif;
            padding: 15px 10px;
        }
        .doc-img {
            width: 100%;
            max-width: 800px;
            display: block;
            margin: 0 auto 5px;
            border: 1px solid #ccc;
        }
        .sig-container {
            max-width: 500px;
            margin: 25px auto 0;
            background: #fff;
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .sig-container h3 {
            font-size: 15px;
            margin-bottom: 10px;
        }
        canvas {
            border: 1px solid #999;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            height: 160px;
            touch-action: none;
            background: #fff;
            cursor: crosshair;
        }
        .btns {
            display: flex;
            gap: 10px;
            max-width: 450px;
            margin: 12px auto 0;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-clear { background: #ddd; color: #333; }
        .btn-ok { background: #2e7d32; color: #fff; }
        .btn-save { background: #1565c0; color: #fff; display: none; max-width: 450px; margin: 15px auto 0; width: 100%; }
        .ok-msg {
            display: none;
            max-width: 500px;
            margin: 15px auto;
            background: #c8e6c9;
            border: 1px solid #81c784;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        .ok-msg p { font-weight: normal; font-size: 12px; margin-top: 5px; }
        /* Overlay signature on the document */
        .doc-wrapper { position: relative; max-width: 800px; margin: 0 auto; }
        #overlay-sig {
            position: absolute;
            display: none;
            max-height: 60px;
            pointer-events: none;
        }
        @media print {
            body { background: #fff; padding: 0; }
            .sig-container, .btns, .btn-save, .ok-msg { display: none !important; }
            .doc-img { border: none; }
        }
    </style>
</head>
<body>

    <!-- Documento original (foto 1) -->
    <img src="https://share.zapia.com/ws6iaf91xk7uofi6ycg5d1" class="doc-img" id="doc1">

    <!-- Documento original (foto 2) -->
    <div class="doc-wrapper">
        <img src="https://share.zapia.com/1qnnmosbj5adg8qatjk4uc" class="doc-img" id="doc2">
        <img id="overlay-sig" alt="">
    </div>

    <!-- Documento original (foto 3) -->
    <img src="https://share.zapia.com/crrw3l0po6ic8v9mk1joq6" class="doc-img" id="doc3">

    <!-- Caixa de assinatura -->
    <div class="sig-container" id="sig-box">
        <h3>✍️ Assine aqui com o dedo</h3>
        <canvas id="pad"></canvas>
        <div class="btns">
            <button class="btn-clear" id="btn-clear">Limpar</button>
            <button class="btn-ok" id="btn-ok">Confirmar Assinatura</button>
        </div>
    </div>

    <div class="ok-msg" id="ok-msg">
        ✅ Documento assinado!
        <p>Tire um print (captura de tela) do documento acima e envie para o Josiel pelo WhatsApp.</p>
    </div>

    <button class="btn-save" id="btn-save" onclick="window.print()">📥 Salvar como PDF</button>

    <script>
    (function(){
        const canvas = document.getElementById('pad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resize(){
            const r = canvas.getBoundingClientRect();
            canvas.width = r.width;
            canvas.height = r.height;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
        }
        window.addEventListener('resize', resize);
        resize();

        // Mouse
        canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('mousemove', e => { if(!drawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseleave', () => drawing = false);

        // Touch
        canvas.addEventListener('touchstart', e => {
            if(e.touches.length === 1){
                drawing = true;
                const t = e.touches[0], r = canvas.getBoundingClientRect();
                ctx.beginPath(); ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
                e.preventDefault();
            }
        });
        canvas.addEventListener('touchmove', e => {
            if(!drawing || e.touches.length !== 1) return;
            const t = e.touches[0], r = canvas.getBoundingClientRect();
            ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
            ctx.stroke();
            e.preventDefault();
        });
        canvas.addEventListener('touchend', e => { drawing = false; e.preventDefault(); });

        document.getElementById('btn-clear').addEventListener('click', () => ctx.clearRect(0,0,canvas.width,canvas.height));

        document.getElementById('btn-ok').addEventListener('click', () => {
            // Verifica se assinou
            const blank = document.createElement('canvas');
            blank.width = canvas.width; blank.height = canvas.height;
            if(canvas.toDataURL() === blank.toDataURL()){
                alert('Por favor, assine antes de confirmar!');
                return;
            }
            const data = canvas.toDataURL('image/png');
            const overlay = document.getElementById('overlay-sig');
            overlay.src = data;
            overlay.style.display = 'block';

            // Posiciona a assinatura sobre a linha de assinatura da foto 2 (parte inferior)
            const doc2 = document.getElementById('doc2');
            const wrapper = doc2.parentElement;
            const wRect = wrapper.getBoundingClientRect();
            const dRect = doc2.getBoundingClientRect();

            // A linha de assinatura do trabalhador fica no canto direito inferior
            const relLeft = (dRect.left - wRect.left) + dRect.width * 0.50;
            const relTop = (dRect.top - wRect.top) + dRect.height * 0.82;

            overlay.style.left = relLeft + 'px';
            overlay.style.top = relTop + 'px';
            overlay.style.width = (dRect.width * 0.35) + 'px';

            // Esconde a caixa de assinatura
            document.getElementById('sig-box').style.display = 'none';
            document.getElementById('ok-msg').style.display = 'block';
            document.getElementById('btn-save').style.display = 'block';

            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    })();
    </script>
</body>
</html>
