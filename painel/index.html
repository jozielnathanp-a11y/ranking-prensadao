<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Estoques Prensadão</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
      padding: 24px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 4px;
      color: #00e5ff;
      text-align: center;
      margin-bottom: 8px;
    }
    p.sub {
      color: #888;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      border: 1px solid #00e5ff33;
      border-radius: 8px;
      padding: 28px 16px;
      text-decoration: none;
      color: #f0f0f0;
      font-size: 1.3rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      transition: border-color 0.2s, background 0.2s;
      box-shadow: 0 0 20px #00e5ff11;
    }
    a.card:hover {
      border-color: #00e5ff;
      background: #1a1a1a;
    }
    a.card .icon {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }
    a.card.matriz {
      grid-column: 1 / -1;
      background: #00e5ff11;
      border-color: #00e5ff55;
      color: #00e5ff;
    }
  </style>
</head>
<body>
  <h1>🏠 Prensadão</h1>
  <p class="sub">Selecione a unidade</p>

  <div class="grid">
    <a class="card matriz" href="/matriz">
      <span class="icon">📊</span>
      Chefão (Geral)
    </a>
    <a class="card" href="/centro">
      <span class="icon">🏪</span>
      Centro
    </a>
    <a class="card" href="/delivery">
      <span class="icon">🛵</span>
      Delivery
    </a>
    <a class="card" href="/boqueiraw">
      <span class="icon">🏬</span>
      Boqueirão
    </a>
    <a class="card" href="/cd">
      <span class="icon">📦</span>
      CD
    </a>
  </div>
</body>
</html>
