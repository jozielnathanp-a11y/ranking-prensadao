<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JP">
  <title>JP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }
    .header {
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; flex-shrink: 0;
    }
    .header-info h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .status-dot {
      font-size: 12px; color: #888;
      display: flex; align-items: center; gap: 5px;
    }
    .status-dot::before {
      content: ''; width: 7px; height: 7px;
      border-radius: 50%; background: #4caf50; display: inline-block;
    }
    .status-dot.talking::before { background: #ff9500; animation: pulse 0.8s infinite; }
    .status-dot.thinking::before { background: #2196f3; animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .chat {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    .chat::-webkit-scrollbar { display: none; }

    .bubble {
      max-width: 82%; padding: 12px 15px;
      border-radius: 18px; font-size: 15px; line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .bubble.user {
      background: #1e1e1e; align-self: flex-end;
      border-bottom-right-radius: 4px; color: #ddd;
    }
    .bubble.jp {
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      align-self: flex-start; border-bottom-left-radius: 4px;
      color: #fff; font-weight: 500;
    }
    .bubble.system {
      background: #1a1a1a; align-self: center;
      font-size: 12px; color: #888; padding: 6px 14px;
      border-radius: 10px; max-width: 92%; text-align: center;
    }
    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .typing span {
      width: 8px; height: 8px; background: #fff;
      border-radius: 50%; animation: bounce 1s infinite;
    }
    .typing span:nth-child(2){animation-delay:0.15s}
    .typing span:nth-child(3){animation-delay:0.3s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    .bottom {
      padding: 16px 24px 32px; border-top: 1px solid #1a1a1a;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .waveform {
      height: 36px; display: flex; align-items: center; gap: 3px;
      opacity: 0; transition: opacity 0.3s;
    }
    .waveform.active { opacity: 1; }
    .waveform .bar {
      width: 4px; background: #ff9500; border-radius: 2px;
      animation: wave 0.6s ease-in-out infinite alternate;
    }
    .waveform .bar:nth-child(1){animation-delay:0s}
    .waveform .bar:nth-child(2){animation-delay:0.1s}
    .waveform .bar:nth-child(3){animation-delay:0.2s}
    .waveform .bar:nth-child(4){animation-delay:0.3s}
    .waveform .bar:nth-child(5){animation-delay:0.4s}
    .waveform .bar:nth-child(6){animation-delay:0.3s}
    .waveform .bar:nth-child(7){animation-delay:0.2s}
    .waveform .bar:nth-child(8){animation-delay:0.1s}
    .waveform .bar:nth-child(9){animation-delay:0s}
    @keyframes wave{from{height:6px}to{height:28px}}

    .mic-btn {
      width: 80px; height: 80px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      color: white; font-size: 32px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
      -webkit-tap-highlight-color: transparent;
    }
    .mic-btn:active{transform:scale(0.94)}
    .mic-btn.recording {
      background: linear-gradient(135deg, #e53935, #ff5252);
      box-shadow: 0 4px 24px rgba(229,57,53,0.5);
      animation: recPulse 1.2s infinite;
    }
    @keyframes recPulse{0%,100%{box-shadow:0 4px 24px rgba(229,57,53,0.5)}50%{box-shadow:0 4px 36px rgba(229,57,53,0.8)}}
    .mic-btn.processing {
      background: linear-gradient(135deg, #1565c0, #2196f3);
      box-shadow: 0 4px 20px rgba(33,150,243,0.4); animation: none;
    }
    .mic-hint { font-size: 12px; color: #555; text-align: center; }

    .config-btn {
      position: absolute; top: 18px; right: 20px;
      background: none; border: none; color: #555;
      font-size: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal.open{display:flex}
    .modal-box {
      background: #141414; border-radius: 20px 20px 0 0;
      padding: 28px 24px 44px; width: 100%; max-width: 480px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-box h2{font-size:18px;margin-bottom:20px;color:#ff9500}
    .modal-box label{font-size:13px;color:#888;display:block;margin-bottom:6px}
    .modal-box input, .modal-box select {
      width:100%;background:#1e1e1e;border:1px solid #333;color:#fff;
      padding:11px 14px;border-radius:10px;font-size:15px;margin-bottom:16px;outline:none;
    }
    .modal-box input:focus,.modal-box select:focus{border-color:#ff9500}
    .save-btn {
      width:100%;padding:14px;
      background:linear-gradient(135deg,#ff6b00,#ff9500);
      border:none;border-radius:12px;color:#fff;
      font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.5px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="avatar">JP</div>
  <div class="header-info">
    <h1>JP</h1>
    <div class="status-dot" id="statusText">Na área</div>
  </div>
  <button class="config-btn" onclick="openConfig()">⚙️</button>
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-hint" id="micHint">Toca pra falar</div>
</div>

<div class="modal" id="configModal">
  <div class="modal-box">
    <h2>⚙️ Configuração</h2>
    <label>Chave do Gemini (Google AI Studio)</label>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <label>Velocidade da voz</label>
    <select id="voiceSpeed">
      <option value="0.85">Normal</option>
      <option value="1.0">Ligeirinho</option>
      <option value="1.2">Rápido</option>
    </select>
    <button class="save-btn" onclick="saveConfig()">Salvar 💾</button>
  </div>
</div>

<script>
var GEMINI_KEY = localStorage.getItem('jp_gemini_key') || '';
var voiceSpeed = parseFloat(localStorage.getItem('jp_voice_speed') || '0.85');

var chat = document.getElementById('chat');
var micBtn = document.getElementById('micBtn');
var waveform = document.getElementById('waveform');
var micHint = document.getElementById('micHint');
var listening = false;
var recognition = null;

// ── Config ──────────────────────────────────────────
function openConfig() {
  document.getElementById('apiKeyInput').value = GEMINI_KEY;
  document.getElementById('voiceSpeed').value = voiceSpeed;
  document.getElementById('configModal').classList.add('open');
}
function saveConfig() {
  GEMINI_KEY = document.getElementById('apiKeyInput').value.trim();
  voiceSpeed = parseFloat(document.getElementById('voiceSpeed').value);
  localStorage.setItem('jp_gemini_key', GEMINI_KEY);
  localStorage.setItem('jp_voice_speed', voiceSpeed);
  document.getElementById('configModal').classList.remove('open');
  addBubble('jp', 'Salvo mano! Tamo junto 💯');
}
document.getElementById('configModal').addEventListener('click', function(e){
  if(e.target===this) this.classList.remove('open');
});

// ── Chat ────────────────────────────────────────────
function addBubble(who, text) {
  var d = document.createElement('div');
  d.className = 'bubble ' + who;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}
function showTyping() {
  var d = document.createElement('div');
  d.className = 'bubble jp typing'; d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  var t = document.getElementById('typing'); if(t) t.remove();
}
function setStatus(cls, txt) {
  var el = document.getElementById('statusText');
  el.className = 'status-dot ' + cls; el.textContent = txt;
}
function resetMic() {
  micBtn.classList.remove('recording','processing');
  micBtn.textContent = '🎤';
  micHint.textContent = 'Toca pra falar';
  setStatus('', 'Na área');
  waveform.classList.remove('active');
  listening = false;
}

// ── Speech Recognition (Web Speech API) ────────────
function toggleMic() {
  if (listening) { stopListening(); return; }
  startListening();
}

function startListening() {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addBubble('system', 'Seu navegador não suporta reconhecimento de voz. Use o Chrome, mano.');
    return;
  }
  if (!GEMINI_KEY) {
    addBubble('system', '⚙️ Cola a chave do Gemini nas configurações primeiro!');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = function() {
    listening = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹️';
    waveform.classList.add('active');
    micHint.textContent = 'Pode mandar ver...';
    setStatus('talking', 'Te ouvindo...');
  };

  recognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    if (!transcript.trim()) { resetMic(); return; }
    listening = false;
    micBtn.classList.remove('recording');
    micBtn.classList.add('processing');
    micBtn.textContent = '⏳';
    waveform.classList.remove('active');
    micHint.textContent = 'Processando...';
    setStatus('thinking', 'Pensando...');
    addBubble('user', transcript);
    showTyping();
    getGeminiReply(transcript);
  };

  recognition.onerror = function(e) {
    resetMic();
    if (e.error === 'no-speech') {
      addBubble('system', 'Não ouvi nada, mano. Fala de novo!');
    } else if (e.error === 'not-allowed') {
      addBubble('system', 'Libera o microfone nas configurações do Chrome!');
    } else {
      addBubble('system', 'Erro no microfone: ' + e.error);
    }
  };

  recognition.onend = function() {
    if (listening) { resetMic(); }
  };

  recognition.start();
}

function stopListening() {
  if (recognition) recognition.stop();
  listening = false;
}

// ── Gemini API ──────────────────────────────────────
var conversationHistory = [];

var systemPrompt = 'Você é o JP, assistente de voz parceiro do Josiel. Personalidade: direto, fala com gírias do estilo rua brasileiro, parceirão, sem frescura. Use expressões como "mano", "trampo", "na moral", "de boa", "saca", "tá ligado", "firmeza", "tô junto". Seja útil mas com personalidade. Respostas CURTAS e diretas — máximo 2 frases — você está sendo falado em voz alta.';

function getGeminiReply(userText) {
  conversationHistory.push({ role: 'user', parts: [{ text: userText }] });

  var body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: conversationHistory,
    generationConfig: { maxOutputTokens: 150, temperature: 0.9 }
  };

  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var reply = '';
    try {
      reply = data.candidates[0].content.parts[0].text;
    } catch(e) {
      reply = 'Deu ruim mano, tenta de novo.';
    }
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    hideTyping();
    addBubble('jp', reply);
    speak(reply);
  })
  .catch(function() {
    hideTyping(); resetMic();
    addBubble('system', 'Sem conexão mano, verifica a internet.');
  });
}

// ── TTS via Google Cloud TTS (voz masculina pt-BR) ──
function speak(text) {
  setStatus('talking', 'Falando...');

  // Usa Google Cloud TTS com a mesma chave do Gemini (se tiver permissão)
  // Voz: pt-BR-Wavenet-B (masculina, natural)
  fetch('https://texttospeech.googleapis.com/v1/text:synthesize?key=' + GEMINI_KEY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      input: { text: text },
      voice: { languageCode: 'pt-BR', name: 'pt-BR-Wavenet-B', ssmlGender: 'MALE' },
      audioConfig: { audioEncoding: 'MP3', speakingRate: voiceSpeed, pitch: -2.0 }
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.audioContent) {
      var audio = new Audio('data:audio/mp3;base64,' + data.audioContent);
      audio.onended = function(){ resetMic(); };
      audio.onerror = function(){ speakFallback(text); };
      audio.play();
    } else {
      speakFallback(text);
    }
  })
  .catch(function(){ speakFallback(text); });
}

// Fallback: Web Speech API (caso Cloud TTS falhe)
function speakFallback(text) {
  if (!('speechSynthesis' in window)) { resetMic(); return; }
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'pt-BR';
  utt.rate = voiceSpeed;
  utt.pitch = 0.5; // mais grave possível

  // Tentar pegar voz masculina
  var voices = window.speechSynthesis.getVoices();
  var male = voices.find(function(v){ return v.lang==='pt-BR' && /masculin|male|homem|brasil.*m/i.test(v.name); })
          || voices.find(function(v){ return v.lang==='pt-BR' && /wavenet/i.test(v.name); })
          || voices.find(function(v){ return v.lang==='pt-BR'; });
  if (male) utt.voice = male;

  utt.onend = function(){ resetMic(); };
  utt.onerror = function(){ resetMic(); };
  window.speechSynthesis.speak(utt);
}

window.speechSynthesis.onvoiceschanged = function(){};

// ── Init ─────────────────────────────────────────────
setTimeout(function(){
  var welcome = 'Oi mano! JP na área 🔥 Toca no mic e manda ver!';
  addBubble('jp', welcome);
  speak(welcome);
  if (!GEMINI_KEY) {
    setTimeout(function(){
      addBubble('system', '⚙️ Toca na engrenagem e cola a chave do Gemini pra começar');
    }, 1200);
  }
}, 500);
</script>
</body>
</html>
