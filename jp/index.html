<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JP">
  <title>JP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }
    .header {
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .header-info h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .status-dot {
      font-size: 12px; color: #888;
      display: flex; align-items: center; gap: 5px;
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf50;
      display: inline-block;
    }
    .status-dot.talking::before { background: #ff9500; animation: pulse 0.8s infinite; }
    .status-dot.thinking::before { background: #2196f3; animation: pulse 0.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .chat::-webkit-scrollbar { display: none; }

    .bubble {
      max-width: 82%;
      padding: 12px 15px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .bubble.user {
      background: #1e1e1e;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      color: #ddd;
    }
    .bubble.jp {
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: #fff;
      font-weight: 500;
    }
    .bubble.system {
      background: #1a1a1a;
      align-self: center;
      font-size: 12px;
      color: #666;
      padding: 6px 12px;
      border-radius: 10px;
      max-width: 90%;
      text-align: center;
    }

    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .typing span {
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .bottom {
      padding: 16px 24px 32px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .waveform {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .waveform.active { opacity: 1; }
    .waveform .bar {
      width: 4px;
      background: #ff9500;
      border-radius: 2px;
      animation: wave 0.6s ease-in-out infinite alternate;
    }
    .waveform .bar:nth-child(1){animation-delay:0s}
    .waveform .bar:nth-child(2){animation-delay:0.1s}
    .waveform .bar:nth-child(3){animation-delay:0.2s}
    .waveform .bar:nth-child(4){animation-delay:0.3s}
    .waveform .bar:nth-child(5){animation-delay:0.4s}
    .waveform .bar:nth-child(6){animation-delay:0.3s}
    .waveform .bar:nth-child(7){animation-delay:0.2s}
    .waveform .bar:nth-child(8){animation-delay:0.1s}
    .waveform .bar:nth-child(9){animation-delay:0s}
    @keyframes wave { from{height:6px} to{height:28px} }

    .mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      color: white;
      font-size: 32px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
      -webkit-tap-highlight-color: transparent;
    }
    .mic-btn:active { transform: scale(0.94); }
    .mic-btn.recording {
      background: linear-gradient(135deg, #e53935, #ff5252);
      box-shadow: 0 4px 24px rgba(229,57,53,0.5);
      animation: recPulse 1.2s infinite;
    }
    @keyframes recPulse { 0%,100%{box-shadow:0 4px 24px rgba(229,57,53,0.5)} 50%{box-shadow:0 4px 36px rgba(229,57,53,0.8)} }
    .mic-btn.processing {
      background: linear-gradient(135deg, #1565c0, #2196f3);
      box-shadow: 0 4px 20px rgba(33,150,243,0.4);
      animation: none;
    }
    .mic-hint { font-size: 12px; color: #555; text-align: center; }

    .config-btn {
      position: absolute; top: 18px; right: 20px;
      background: none; border: none; color: #555;
      font-size: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal.open { display: flex; }
    .modal-box {
      background: #141414;
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 44px;
      width: 100%; max-width: 480px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-box h2 { font-size: 18px; margin-bottom: 20px; color: #ff9500; }
    .modal-box label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
    .modal-box input, .modal-box select {
      width: 100%; background: #1e1e1e;
      border: 1px solid #333; color: #fff;
      padding: 11px 14px; border-radius: 10px;
      font-size: 15px; margin-bottom: 16px; outline: none;
    }
    .modal-box input:focus, .modal-box select:focus { border-color: #ff9500; }
    .save-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="avatar">JP</div>
  <div class="header-info">
    <h1>JP</h1>
    <div class="status-dot" id="statusText">Na área</div>
  </div>
  <button class="config-btn" onclick="openConfig()">⚙️</button>
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-hint" id="micHint">Toca pra falar</div>
</div>

<div class="modal" id="configModal">
  <div class="modal-box">
    <h2>⚙️ Configuração</h2>
    <label>Chave OpenAI (Whisper + GPT-4o)</label>
    <input type="password" id="apiKeyInput" placeholder="sk-..." />
    <label>URL do Webhook (opcional)</label>
    <input type="text" id="webhookInput" placeholder="https://..." />
    <label>Velocidade da voz</label>
    <select id="voiceSpeed">
      <option value="0.9">Normal</option>
      <option value="1.1">Ligeirinho</option>
      <option value="1.3">Rápido</option>
    </select>
    <button class="save-btn" onclick="saveConfig()">Salvar</button>
  </div>
</div>

<script>
var config = {
  apiKey: localStorage.getItem('jp_api_key') || '',
  webhook: localStorage.getItem('jp_webhook') || '',
  voiceSpeed: parseFloat(localStorage.getItem('jp_voice_speed') || '0.9')
};

function openConfig() {
  document.getElementById('apiKeyInput').value = config.apiKey;
  document.getElementById('webhookInput').value = config.webhook;
  document.getElementById('voiceSpeed').value = config.voiceSpeed;
  document.getElementById('configModal').classList.add('open');
}
function saveConfig() {
  config.apiKey = document.getElementById('apiKeyInput').value.trim();
  config.webhook = document.getElementById('webhookInput').value.trim();
  config.voiceSpeed = parseFloat(document.getElementById('voiceSpeed').value);
  localStorage.setItem('jp_api_key', config.apiKey);
  localStorage.setItem('jp_webhook', config.webhook);
  localStorage.setItem('jp_voice_speed', config.voiceSpeed);
  document.getElementById('configModal').classList.remove('open');
  addBubble('jp', 'Salvo mano! Tamo junto 💯');
}
document.getElementById('configModal').addEventListener('click', function(e){
  if(e.target === this) this.classList.remove('open');
});

var chat = document.getElementById('chat');

function addBubble(who, text) {
  var d = document.createElement('div');
  d.className = 'bubble ' + who;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}
function showTyping() {
  var d = document.createElement('div');
  d.className = 'bubble jp typing';
  d.id = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}
function setStatus(state, text) {
  var el = document.getElementById('statusText');
  el.className = 'status-dot ' + state;
  el.textContent = text;
}

var mediaRecorder, audioChunks = [], recording = false;
var micBtn = document.getElementById('micBtn');
var waveform = document.getElementById('waveform');
var micHint = document.getElementById('micHint');

function toggleMic() {
  if (recording) { stopRecording(); }
  else { startRecording(); }
}

function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    audioChunks = [];
    var mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
    mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
    mediaRecorder.onstop = processAudio;
    mediaRecorder.start();
    recording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹️';
    waveform.classList.add('active');
    micHint.textContent = 'Pode mandar ver...';
    setStatus('talking', 'Te ouvindo...');
  }).catch(function() {
    addBubble('system', 'Libera o microfone nas configurações do Chrome, mano.');
  });
}

function stopRecording() {
  if (mediaRecorder && recording) {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(function(t){ t.stop(); });
    recording = false;
    micBtn.classList.remove('recording');
    micBtn.classList.add('processing');
    micBtn.textContent = '⏳';
    waveform.classList.remove('active');
    micHint.textContent = 'Processando...';
    setStatus('thinking', 'Pensando...');
  }
}

function processAudio() {
  var blob = new Blob(audioChunks, { type: 'audio/webm' });
  var fd = new FormData();
  fd.append('file', blob, 'audio.webm');
  fd.append('model', 'whisper-1');
  fd.append('language', 'pt');

  if (!config.apiKey) {
    resetMic();
    addBubble('system', 'Configura a chave da API primeiro ⚙️');
    return;
  }

  fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + config.apiKey },
    body: fd
  }).then(function(r){ return r.json(); }).then(function(data) {
    var transcript = data.text || '';
    if (!transcript.trim()) {
      resetMic();
      addBubble('system', 'Não peguei nada, mano. Fala de novo!');
      return;
    }
    addBubble('user', transcript);
    showTyping();
    getReply(transcript);
  }).catch(function() {
    resetMic();
    addBubble('system', 'Erro na transcrição. Verifica a chave da API.');
  });
}

function getReply(transcript) {
  var systemPrompt = 'Você é o JP, assistente de voz parceiro do Josiel. Personalidade: direto, fala com gírias do estilo rua brasileiro, parceirão, sem frescura. Use expressões como "mano", "trampo", "na moral", "de boa", "saca", "tá ligado", "firmeza", "tô junto". Seja útil mas com personalidade. Respostas curtas e diretas — você está sendo lido em voz alta. Máximo 2-3 frases.';

  var endpoint = config.webhook || null;

  if (endpoint) {
    fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: transcript })
    }).then(function(r){ return r.json(); }).then(function(data) {
      var reply = data.reply || data.text || data.message || JSON.stringify(data);
      hideTyping();
      addBubble('jp', reply);
      speak(reply);
    }).catch(function() {
      hideTyping(); resetMic();
      addBubble('system', 'Erro no webhook, mano.');
    });
  } else {
    fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + config.apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: transcript }
        ],
        max_tokens: 200
      })
    }).then(function(r){ return r.json(); }).then(function(data) {
      var reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || 'Deu ruim mano, tenta de novo.';
      hideTyping();
      addBubble('jp', reply);
      speak(reply);
    }).catch(function() {
      hideTyping(); resetMic();
      addBubble('system', 'Sem conexão com o servidor.');
    });
  }
}

function speak(text) {
  if (!('speechSynthesis' in window)) { resetMic(); return; }
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'pt-BR';
  utt.rate = config.voiceSpeed;
  utt.pitch = 0.85;
  var voices = window.speechSynthesis.getVoices();
  var ptBR = voices.find(function(v){ return v.lang === 'pt-BR' && v.name.toLowerCase().includes('male'); })
          || voices.find(function(v){ return v.lang === 'pt-BR'; });
  if (ptBR) utt.voice = ptBR;
  setStatus('talking', 'Falando...');
  utt.onend = function() { setStatus('', 'Na área'); resetMic(); };
  window.speechSynthesis.speak(utt);
}

function resetMic() {
  micBtn.classList.remove('recording', 'processing');
  micBtn.textContent = '🎤';
  micHint.textContent = 'Toca pra falar';
  setStatus('', 'Na área');
}

window.speechSynthesis.onvoiceschanged = function(){};

setTimeout(function() {
  addBubble('jp', 'Oi mano! JP na área 🔥 Toca no mic e manda ver!');
  speak('Oi mano! JP na área. Toca no mic e manda ver!');
  if (!config.apiKey) {
    setTimeout(function(){ addBubble('system', '⚙️ Configura a chave da API antes de usar'); }, 1500);
  }
}, 600);
</script>
</body>
</html>
